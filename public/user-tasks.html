<!DOCTYPE html>
<!--
  ============================================================
  🖥️ VISTA DE TAREAS DEL USUARIO — user-tasks.html
  ============================================================
  Esta página es para el USUARIO NORMAL (no el admin).
  Permite que un usuario consulte sus propias tareas asignadas.

  ¿Cómo funciona?
  1. El usuario escribe su ID en el campo de texto
  2. Al hacer clic en "Buscar", el JavaScript llama al backend:
     GET /api/users/:userId/tasks
  3. El backend devuelve las tareas del usuario en JSON
  4. El JavaScript muestra esas tareas en pantalla
  ============================================================
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Tareas - Sistema de Gestión</title>
  <style>
    /* --- ESTILOS GENERALES --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 24px;
    }

    /* --- SECCIÓN DE BÚSQUEDA --- */
    .busqueda {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto 24px auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .busqueda label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #555;
    }

    .busqueda input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .busqueda button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .busqueda button:hover {
      background-color: #2980b9;
    }

    /* --- ÁREA DE RESULTADOS --- */
    #resultados {
      max-width: 800px;
      margin: 0 auto;
    }

    /* --- MENSAJE DE ERROR / INFO --- */
    .mensaje {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 12px 16px;
      color: #856404;
      text-align: center;
      margin-bottom: 16px;
    }

    .mensaje.error {
      background: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }

    .mensaje.exito {
      background: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }

    /* --- TARJETA DE TAREA --- */
    .tarea-card {
      background: #fff;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      border-left: 5px solid #ccc; /* El color cambia según el estado */
    }

    /* Colores del borde según el estado de la tarea */
    .tarea-card.pendiente      { border-left-color: #e67e22; } /* Naranja */
    .tarea-card.en_progreso    { border-left-color: #3498db; } /* Azul */
    .tarea-card.completada     { border-left-color: #2ecc71; } /* Verde */

    .tarea-titulo {
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 6px;
    }

    .tarea-descripcion {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .tarea-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* --- BADGES (etiquetas de estado/prioridad) --- */
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .badge-pendiente   { background: #fdebd0; color: #e67e22; }
    .badge-en_progreso { background: #d6eaf8; color: #3498db; }
    .badge-completada  { background: #d5f5e3; color: #2ecc71; }
    .badge-alta        { background: #fadbd8; color: #c0392b; }
    .badge-media       { background: #fef9e7; color: #f39c12; }
    .badge-baja        { background: #eaf7fb; color: #17a589; }

    /* --- CONTADOR DE TAREAS --- */
    .contador {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <h1>📋 Mis Tareas Asignadas</h1>

  <!-- ==========================================
    FORMULARIO DE BÚSQUEDA
    El usuario ingresa su ID para ver sus tareas
  ========================================== -->
  <div class="busqueda">
    <label for="inputUserId">Ingresa tu ID de usuario:</label>
    <!-- 
      Al presionar Enter o hacer clic en Buscar,
      se ejecuta la función buscarTareas()
    -->
    <input
      type="number"
      id="inputUserId"
      placeholder="Ejemplo: 1, 2, 3..."
      min="1"
      onkeypress="if(event.key==='Enter') buscarTareas()"
    />
    <button onclick="buscarTareas()">🔍 Ver mis tareas</button>
  </div>

  <!-- ==========================================
    ÁREA DE RESULTADOS
    Aquí se inyecta el HTML dinámicamente con JS
  ========================================== -->
  <div id="resultados"></div>

  <!-- ==========================================
    JAVASCRIPT DEL FRONTEND
    Este código se ejecuta en el NAVEGADOR (no en el servidor)
  ========================================== -->
  <script>
    // -------------------------------------------------------
    // FUNCIÓN PRINCIPAL: buscarTareas()
    // -------------------------------------------------------
    // Se ejecuta cuando el usuario hace clic en "Ver mis tareas"
    // Su trabajo: leer el userId del input, llamar al backend
    // y mostrar los resultados en pantalla
    // -------------------------------------------------------
    async function buscarTareas() {
      // Leemos el valor del input donde el usuario escribió su ID
      // .trim() elimina espacios en blanco al inicio y al final
      const userId = document.getElementById("inputUserId").value.trim();

      // Referencia al div donde mostraremos los resultados
      const contenedor = document.getElementById("resultados");

      // Validación básica: el campo no puede estar vacío
      if (!userId) {
        contenedor.innerHTML = `
          <div class="mensaje error">
            ⚠️ Por favor ingresa tu ID de usuario antes de buscar.
          </div>
        `;
        return; // Detenemos la función aquí
      }

      // Mostramos un mensaje de carga mientras esperamos la respuesta
      contenedor.innerHTML = `<div class="mensaje">⏳ Buscando tus tareas...</div>`;

      try {
        // -------------------------------------------------------
        // LLAMADA AL BACKEND
        // -------------------------------------------------------
        // fetch() es la función nativa del navegador para hacer
        // peticiones HTTP. Es como abrir una URL en el navegador
        // pero desde JavaScript, sin recargar la página.
        //
        // La URL llama al endpoint que creamos:
        // GET /api/users/:userId/tasks
        // -------------------------------------------------------
        const respuesta = await fetch(`/api/users/${userId}/tasks`);
        // await → espera a que el servidor responda antes de continuar

        // Convertimos la respuesta de texto a objeto JavaScript
        const datos = await respuesta.json();

        // Si el servidor respondió con un error (ok: false)
        if (!datos.ok) {
          contenedor.innerHTML = `
            <div class="mensaje error">
              ❌ ${datos.mensaje}
            </div>
          `;
          return;
        }

        // Si no hay tareas asignadas para ese usuario
        if (datos.data.length === 0) {
          contenedor.innerHTML = `
            <div class="mensaje">
              📭 El usuario ${userId} no tiene tareas asignadas por el momento.
            </div>
          `;
          return;
        }

        // -------------------------------------------------------
        // MOSTRAR LAS TAREAS EN PANTALLA
        // -------------------------------------------------------
        // Construimos el HTML dinámicamente usando los datos del backend
        // -------------------------------------------------------
        let html = `
          <div class="contador">
            👤 Usuario #${datos.userId} — <strong>${datos.cantidad}</strong> tarea(s) asignada(s)
          </div>
        `;

        // Iteramos sobre cada tarea y creamos una "tarjeta" HTML
        datos.data.forEach((tarea) => {
          html += `
            <div class="tarea-card ${tarea.estado}">
              <div class="tarea-titulo">${tarea.titulo}</div>
              <div class="tarea-descripcion">${tarea.descripcion}</div>
              <div class="tarea-meta">
                <span class="badge badge-${tarea.estado}">
                  ${formatearEstado(tarea.estado)}
                </span>
                <span class="badge badge-${tarea.prioridad}">
                  Prioridad: ${tarea.prioridad}
                </span>
                <span style="font-size:12px; color:#aaa;">
                  📅 Creada: ${tarea.fechaCreacion}
                </span>
              </div>
            </div>
          `;
        });

        // Insertamos todo el HTML generado en el contenedor
        contenedor.innerHTML = html;

      } catch (error) {
        // Error de red (ej: el servidor no está corriendo)
        contenedor.innerHTML = `
          <div class="mensaje error">
            🔌 No se pudo conectar con el servidor. 
            Asegúrate de que el backend esté corriendo con <strong>node server.js</strong>
          </div>
        `;
        console.error("Error al conectar con el backend:", error);
      }
    }

    // -------------------------------------------------------
    // FUNCIÓN AUXILIAR: formatearEstado()
    // -------------------------------------------------------
    // Convierte "en_progreso" → "En Progreso"
    // para que se vea mejor en la pantalla
    // -------------------------------------------------------
    function formatearEstado(estado) {
      const formatos = {
        pendiente: "⏳ Pendiente",
        en_progreso: "🔄 En Progreso",
        completada: "✅ Completada",
      };
      // Si el estado existe en el objeto, lo devuelve formateado
      // Si no existe, devuelve el estado original
      return formatos[estado] || estado;
    }
  </script>

</body>
</html>

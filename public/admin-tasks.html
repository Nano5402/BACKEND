<!DOCTYPE html>
<!--
  ============================================================
  🛡️ PANEL ADMINISTRATIVO — admin-tasks.html
  ============================================================
  Esta página es para el ADMINISTRADOR del sistema.
  Permite:
  1. Ver TODAS las tareas del sistema
  2. Filtrar las tareas por: usuario, estado, prioridad, fechas

  ¿Cómo funciona el filtrado?
  1. El admin selecciona los filtros que quiera usar
  2. Al hacer clic en "Aplicar Filtros", el JavaScript
     construye la URL con los parámetros de búsqueda:
     GET /api/tasks/filter?userId=1&estado=pendiente
  3. El backend filtra y devuelve los resultados
  4. Se muestran en pantalla
  ============================================================
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrador - Filtro de Tareas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00b4d8;
      margin-bottom: 8px;
    }

    .subtitulo {
      text-align: center;
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }

    /* --- PANEL DE FILTROS --- */
    .panel-filtros {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto 24px auto;
      border: 1px solid #0f3460;
    }

    .panel-filtros h2 {
      color: #00b4d8;
      margin-bottom: 16px;
      font-size: 16px;
    }

    /* Grid de filtros: 2 columnas en pantalla grande, 1 en móvil */
    .filtros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .filtro-grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filtro-grupo label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      font-weight: bold;
    }

    .filtro-grupo select,
    .filtro-grupo input {
      padding: 10px 12px;
      background: #0f3460;
      border: 1px solid #1a4a80;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
    }

    .filtro-grupo select:focus,
    .filtro-grupo input:focus {
      outline: none;
      border-color: #00b4d8;
    }

    /* --- BOTONES --- */
    .botones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-filtrar  { background: #00b4d8; color: #1a1a2e; }
    .btn-limpiar  { background: #e74c3c; color: white; }
    .btn-todas    { background: #2ecc71; color: #1a1a2e; }

    /* --- RESULTADOS --- */
    #resultados {
      max-width: 900px;
      margin: 0 auto;
    }

    .info-resultado {
      background: #16213e;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #aaa;
      border: 1px solid #0f3460;
    }

    .info-resultado strong { color: #00b4d8; }

    /* --- TABLA DE TAREAS --- */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
    }

    thead tr {
      background: #0f3460;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      color: #00b4d8;
      font-weight: bold;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      font-size: 14px;
    }

    tr:hover td {
      background: #0f3460;
    }

    /* --- BADGES EN LA TABLA --- */
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .badge-pendiente   { background: #4a2f10; color: #e67e22; }
    .badge-en_progreso { background: #102a4a; color: #3498db; }
    .badge-completada  { background: #0e3b2a; color: #2ecc71; }
    .badge-alta        { background: #4a1010; color: #e74c3c; }
    .badge-media       { background: #4a3a10; color: #f39c12; }
    .badge-baja        { background: #10354a; color: #17a589; }

    .sin-resultados {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }

    .cargando {
      text-align: center;
      padding: 30px;
      color: #00b4d8;
    }
  </style>
</head>
<body>

  <h1>🛡️ Panel Administrador</h1>
  <p class="subtitulo">Gestión y filtrado de tareas del sistema</p>

  <!-- ==========================================
    PANEL DE FILTROS
    El admin puede combinar cualquier filtro
  ========================================== -->
  <div class="panel-filtros">
    <h2>🔍 Filtros de búsqueda</h2>

    <div class="filtros-grid">

      <!-- FILTRO 1: Por usuario -->
      <!-- El admin escribe el ID del usuario a buscar -->
      <div class="filtro-grupo">
        <label for="filtroUserId">👤 ID de Usuario</label>
        <input
          type="number"
          id="filtroUserId"
          placeholder="Ej: 1, 2, 3..."
          min="1"
        />
      </div>

      <!-- FILTRO 2: Por estado -->
      <!-- Desplegable con los 3 estados posibles -->
      <div class="filtro-grupo">
        <label for="filtroEstado">📊 Estado</label>
        <select id="filtroEstado">
          <option value="">-- Todos los estados --</option>
          <option value="pendiente">⏳ Pendiente</option>
          <option value="en_progreso">🔄 En Progreso</option>
          <option value="completada">✅ Completada</option>
        </select>
      </div>

      <!-- FILTRO 3: Por prioridad -->
      <div class="filtro-grupo">
        <label for="filtroPrioridad">🎯 Prioridad</label>
        <select id="filtroPrioridad">
          <option value="">-- Todas las prioridades --</option>
          <option value="alta">🔴 Alta</option>
          <option value="media">🟡 Media</option>
          <option value="baja">🟢 Baja</option>
        </select>
      </div>

      <!-- FILTRO 4: Fecha desde -->
      <div class="filtro-grupo">
        <label for="filtroFechaDesde">📅 Desde (fecha)</label>
        <input type="date" id="filtroFechaDesde" />
      </div>

      <!-- FILTRO 5: Fecha hasta -->
      <div class="filtro-grupo">
        <label for="filtroFechaHasta">📅 Hasta (fecha)</label>
        <input type="date" id="filtroFechaHasta" />
      </div>

    </div>

    <!-- BOTONES DE ACCIÓN -->
    <div class="botones">
      <button class="btn btn-filtrar" onclick="aplicarFiltros()">
        🔍 Aplicar Filtros
      </button>
      <button class="btn btn-limpiar" onclick="limpiarFiltros()">
        🗑️ Limpiar Filtros
      </button>
      <button class="btn btn-todas" onclick="cargarTodasLasTareas()">
        📋 Ver Todas las Tareas
      </button>
    </div>
  </div>

  <!-- ==========================================
    ÁREA DE RESULTADOS
  ========================================== -->
  <div id="resultados">
    <div class="sin-resultados">
      Usa los filtros de arriba o haz clic en "Ver Todas las Tareas"
    </div>
  </div>

  <!-- ==========================================
    JAVASCRIPT DEL PANEL ADMIN
  ========================================== -->
  <script>
    // -------------------------------------------------------
    // FUNCIÓN 1: aplicarFiltros()
    // -------------------------------------------------------
    // Lee los valores de todos los filtros del formulario,
    // construye la URL con los query params y llama al backend.
    //
    // Ejemplo de URL generada:
    // /api/tasks/filter?userId=1&estado=pendiente&prioridad=alta
    // -------------------------------------------------------
    async function aplicarFiltros() {
      // Leemos los valores de cada filtro
      const userId     = document.getElementById("filtroUserId").value.trim();
      const estado     = document.getElementById("filtroEstado").value;
      const prioridad  = document.getElementById("filtroPrioridad").value;
      const fechaDesde = document.getElementById("filtroFechaDesde").value;
      const fechaHasta = document.getElementById("filtroFechaHasta").value;

      // -------------------------------------------------------
      // CONSTRUCCIÓN DE LA URL CON QUERY PARAMS
      // -------------------------------------------------------
      // URLSearchParams es una clase de JavaScript que ayuda
      // a construir los parámetros de búsqueda de la URL.
      //
      // Es como armar un formulario de búsqueda en texto:
      // params.append("estado", "pendiente") →  ?estado=pendiente
      // params.append("userId", "1")         →  &userId=1
      // -------------------------------------------------------
      const params = new URLSearchParams();

      // Solo agregamos un parámetro si el filtro tiene valor
      // (si el usuario lo dejó vacío, no lo incluimos)
      if (userId)     params.append("userId", userId);
      if (estado)     params.append("estado", estado);
      if (prioridad)  params.append("prioridad", prioridad);
      if (fechaDesde) params.append("fechaDesde", fechaDesde);
      if (fechaHasta) params.append("fechaHasta", fechaHasta);

      // Construimos la URL final
      // params.toString() convierte el objeto a texto: "userId=1&estado=pendiente"
      const url = `/api/tasks/filter?${params.toString()}`;

      // Llamamos al backend con esa URL
      await llamarAPI(url, "filtro");
    }

    // -------------------------------------------------------
    // FUNCIÓN 2: cargarTodasLasTareas()
    // -------------------------------------------------------
    // Llama al endpoint sin filtros: GET /api/tasks
    // Muestra TODAS las tareas del sistema
    // -------------------------------------------------------
    async function cargarTodasLasTareas() {
      await llamarAPI("/api/tasks", "todas");
    }

    // -------------------------------------------------------
    // FUNCIÓN 3: limpiarFiltros()
    // -------------------------------------------------------
    // Resetea todos los campos del formulario a su valor vacío
    // -------------------------------------------------------
    function limpiarFiltros() {
      document.getElementById("filtroUserId").value    = "";
      document.getElementById("filtroEstado").value    = "";
      document.getElementById("filtroPrioridad").value = "";
      document.getElementById("filtroFechaDesde").value = "";
      document.getElementById("filtroFechaHasta").value = "";

      document.getElementById("resultados").innerHTML = `
        <div class="sin-resultados">
          Filtros limpiados. Aplica nuevos filtros o carga todas las tareas.
        </div>
      `;
    }

    // -------------------------------------------------------
    // FUNCIÓN CENTRAL: llamarAPI(url, tipo)
    // -------------------------------------------------------
    // Esta función hace la petición al backend y muestra los resultados.
    // Es llamada por aplicarFiltros() y cargarTodasLasTareas().
    // Separar esta lógica evita repetir código (principio DRY:
    // Don't Repeat Yourself = No te repitas)
    // -------------------------------------------------------
    async function llamarAPI(url, tipo) {
      const contenedor = document.getElementById("resultados");

      // Mostramos cargando...
      contenedor.innerHTML = `<div class="cargando">⏳ Cargando tareas...</div>`;

      try {
        // Hacemos la petición al backend
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          contenedor.innerHTML = `
            <div class="sin-resultados">❌ ${datos.mensaje}</div>
          `;
          return;
        }

        // Si no hay resultados para los filtros aplicados
        if (datos.data.length === 0) {
          contenedor.innerHTML = `
            <div class="sin-resultados">
              🔍 No se encontraron tareas con los filtros seleccionados.
            </div>
          `;
          return;
        }

        // -------------------------------------------------------
        // Construimos el resumen de filtros aplicados
        // (solo si estamos filtrando, no mostrando todas)
        // -------------------------------------------------------
        let infoFiltros = "";
        if (tipo === "filtro" && datos.filtrosAplicados) {
          const filtros = datos.filtrosAplicados;
          // Construimos un texto con los filtros activos
          const partes = [];
          if (filtros.userId)     partes.push(`Usuario #${filtros.userId}`);
          if (filtros.estado)     partes.push(`Estado: ${filtros.estado}`);
          if (filtros.prioridad)  partes.push(`Prioridad: ${filtros.prioridad}`);
          if (filtros.fechaDesde) partes.push(`Desde: ${filtros.fechaDesde}`);
          if (filtros.fechaHasta) partes.push(`Hasta: ${filtros.fechaHasta}`);

          infoFiltros = partes.length > 0
            ? `<div class="info-resultado">
                🔎 Filtros activos: <strong>${partes.join(" | ")}</strong>
                — Resultados: <strong>${datos.cantidad}</strong> tarea(s)
               </div>`
            : `<div class="info-resultado">Sin filtros activos — mostrando todas las tareas</div>`;
        } else {
          infoFiltros = `
            <div class="info-resultado">
              📋 Total de tareas en el sistema: <strong>${datos.cantidad}</strong>
            </div>
          `;
        }

        // -------------------------------------------------------
        // Construimos la TABLA de resultados
        // -------------------------------------------------------
        let tablaHtml = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Título</th>
                <th>Estado</th>
                <th>Prioridad</th>
                <th>Usuarios</th>
                <th>Fecha Creación</th>
              </tr>
            </thead>
            <tbody>
        `;

        // Llenamos la tabla con cada tarea
        datos.data.forEach((tarea) => {
          tablaHtml += `
            <tr>
              <td>${tarea.id}</td>
              <td>
                <strong>${tarea.titulo}</strong>
                <br>
                <small style="color:#888">${tarea.descripcion}</small>
              </td>
              <td>
                <span class="badge badge-${tarea.estado}">
                  ${formatearEstado(tarea.estado)}
                </span>
              </td>
              <td>
                <span class="badge badge-${tarea.prioridad}">
                  ${tarea.prioridad}
                </span>
              </td>
              <td>
                <!-- Mostramos los IDs de usuarios asignados como badges -->
                ${tarea.usuariosAsignados
                  .map(uid => `<span style="background:#0f3460;padding:2px 7px;border-radius:10px;font-size:11px;margin:2px;display:inline-block;">U${uid}</span>`)
                  .join("")}
              </td>
              <td style="color:#888">${tarea.fechaCreacion}</td>
            </tr>
          `;
        });

        tablaHtml += `</tbody></table>`;

        // Insertamos el resumen + la tabla en el contenedor
        contenedor.innerHTML = infoFiltros + tablaHtml;

      } catch (error) {
        contenedor.innerHTML = `
          <div class="sin-resultados">
            🔌 Error de conexión. Verifica que el servidor esté corriendo.
          </div>
        `;
        console.error("Error:", error);
      }
    }

    // -------------------------------------------------------
    // FUNCIÓN AUXILIAR: formatearEstado()
    // -------------------------------------------------------
    function formatearEstado(estado) {
      const formatos = {
        pendiente: "Pendiente",
        en_progreso: "En Progreso",
        completada: "Completada",
      };
      return formatos[estado] || estado;
    }

    // Al cargar la página, mostramos todas las tareas automáticamente
    window.addEventListener("DOMContentLoaded", cargarTodasLasTareas);
  </script>

</body>
</html>
